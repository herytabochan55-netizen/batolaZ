<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zmart Baznas Batola</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fef2f2; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-4xl font-bold text-red-800">Zmart Baznas Batola</h1>
            <p class="text-red-900/70">Dashboard Monitoring 60 Mustahik</p>
            <div id="current-date" class="mt-2 text-red-700 font-semibold bg-red-100/50 inline-block px-3 py-1 rounded-full text-sm"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-red-600">
                <p class="text-slate-500 text-sm">Pendapatan Rata-rata</p>
                <h2 id="avg-income" class="text-2xl font-bold mt-1 text-red-700">Rp 0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-red-600">
                <p class="text-slate-500 text-sm">Tertinggi</p>
                <h2 id="max-income" class="text-lg font-bold mt-1 text-slate-800 leading-tight">Rp 0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-red-600">
                <p class="text-slate-500 text-sm">Terendah</p>
                <h2 id="min-income" class="text-lg font-bold mt-1 text-slate-800 leading-tight">Rp 0</h2>
            </div>
        </div>

        <div class="flex justify-end mb-6">
            <button onclick="exportAllToExcel()" class="bg-red-700 hover:bg-red-800 text-white px-6 py-2 rounded-full font-medium transition shadow-lg">
                Export Semua (Excel)
            </button>
        </div>

        <div id="mustahik-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-lg rounded-3xl p-6 shadow-2xl">
            <div class="flex items-center gap-4 mb-4">
                <img id="edit-photo-preview" src="https://placehold.co/80x80/red/white?text=Foto" class="w-20 h-20 rounded-full object-cover border-2 border-red-100">
                <div class="flex-1">
                    <input type="text" id="edit-name" class="text-2xl font-bold border-none w-full focus:outline-none text-red-800" oninput="updateName()" placeholder="Nama Mustahik">
                    <input type="text" id="edit-photo-url" class="text-xs text-slate-400 border-none w-full focus:outline-none mt-1" oninput="updatePhoto()" placeholder="Masukkan Link Foto (URL)">
                </div>
            </div>
            
            <div class="space-y-3">
                <div class="flex justify-between border-b pb-2">
                    <span class="text-slate-500">Saldo Hari Ini:</span>
                    <span id="modal-balance" class="font-bold text-red-700">Rp 0</span>
                </div>
                <div class="flex justify-between border-b pb-2">
                    <span class="text-slate-500 text-sm">Keuntungan Bersih (10%):</span>
                    <span id="modal-profit" class="font-bold text-green-600 text-lg">Rp 0</span>
                </div>
                <div class="flex gap-2 mt-4">
                    <input type="number" id="new-amount" placeholder="Jumlah (Rp)" class="border p-2 rounded-lg flex-1">
                    <select id="new-type" class="border p-2 rounded-lg">
                        <option value="income">Pemasukan</option>
                        <option value="expense">Pengeluaran</option>
                    </select>
                    <button onclick="addTransaction()" class="bg-red-600 text-white px-4 rounded-lg">OK</button>
                </div>
                <div id="transaction-list" class="max-h-40 overflow-y-auto space-y-1 mt-2"></div>
            </div>

            <div class="mt-6 flex gap-3">
                <button onclick="exportIndividualToExcel()" class="flex-1 bg-slate-100 py-2 rounded-xl text-sm">Export Excel</button>
                <button onclick="closeModal()" class="flex-1 bg-red-600 text-white py-2 rounded-xl text-sm">Selesai</button>
            </div>
        </div>
    </div>

    <script>
        const mustahikList = [
            { name: "Norhayati", origin: "Rantau Badauh" }, { name: "Noor Laila", origin: "Rantau Badauh" }, { name: "Masbiyah", origin: "Rantau Badauh" },
            { name: "Misnawati", origin: "Rantau Badauh" }, { name: "Nor Hikmah", origin: "Rantau Badauh" }, { name: "Rahmah", origin: "Rantau Badauh" },
            { name: "Salni", origin: "Rantau Badauh" }, { name: "M. Baihaqi", origin: "Rantau Badauh" }, { name: "Indah Swesti", origin: "Rantau Badauh" },
            { name: "Siti Aisyah", origin: "Rantau Badauh" }, { name: "Mariani", origin: "Rantau Badauh" }, { name: "Tuti Barokah", origin: "Rantau Badauh" },
            { name: "Hj. ST. Misbah", origin: "Rantau Badauh" }, { name: "Misriyati", origin: "Rantau Badauh" }, { name: "Puput Aulia", origin: "Rantau Badauh" },
            { name: "Hariyanto", origin: "Mandastana" }, { name: "Lilis Turiani", origin: "Mandastana" }, { name: "Rusmiyati", origin: "Mandastana" },
            { name: "Iqbal Muntesa", origin: "Mandastana" }, { name: "Syaiful", origin: "Alalak" }, { name: "Rahmawati", origin: "Alalak" },
            { name: "Maria", origin: "Alalak" }, { name: "Misdah", origin: "Marabahan" }, { name: "Dina Amalia Fitri", origin: "Marabahan" },
            { name: "Noraida", origin: "Cerbon" }, { name: "Megawati", origin: "Cerbon" }, { name: "Riska Jannah", origin: "Cerbon" },
            { name: "Rahmawati", origin: "Cerbon" }, { name: "Siti Nor Fitriani", origin: "Cerbon" }, { name: "Suaibatul Aslamiyah", origin: "Cerbon" },
            { name: "Syarifullah", origin: "Marabahan" }, { name: "Asiah", origin: "Tabukan" }, { name: "Reni Winahyu", origin: "Tabukan" },
            { name: "M.Ikhsan Fauzi", origin: "Barambai" }, { name: "Misran", origin: "Marabahan" }, { name: "Letti Sia", origin: "Marabahan" },
            { name: "Aida", origin: "Marabahan" }, { name: "Rudi Sanjaya", origin: "Cerbon" }, { name: "Dewi", origin: "Cerbon" },
            { name: "Halimah", origin: "Bakumpai" }, { name: "Maimunah", origin: "Tabukan" }, { name: "Jumiati", origin: "Barambai" },
            { name: "Nupriana", origin: "Rantau Badauh" }, { name: "Erniawati", origin: "Marabahan" }, { name: "Rini", origin: "Marabahan" },
            { name: "Nor Halimah", origin: "Marabahan" }, { name: "Hasanah", origin: "Marabahan" }, { name: "Wahyu Gumlar", origin: "Bakumpai" },
            { name: "Eka Novia Rina", origin: "Bakumpai" }, { name: "Jamaluddin", origin: "Bakumpai" }
        ];

        let mustahiks = JSON.parse(localStorage.getItem('zmart_data')) || mustahikList.map((m, i) => ({
            id: i + 1, name: m.name, origin: m.origin, initialBalance: 0, transactions: [], photo: '', lastUpdated: '-'
        }));

        let activeId = null;

        function updateDateDisplay() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', options);
        }

        function saveData() {
            localStorage.setItem('zmart_data', JSON.stringify(mustahiks));
            updateUI();
        }

        function calculateMetrics(m) {
            const inc = m.transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const exp = m.transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            return { inc, exp, bal: m.initialBalance + inc - exp, profit: inc * 0.1 };
        }

        function updateUI() {
            const grid = document.getElementById('mustahik-grid');
            grid.innerHTML = mustahiks.map(m => {
                const met = calculateMetrics(m);
                return `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-red-100 hover:shadow-md transition">
                        <div class="flex items-center gap-3">
                            <img src="${m.photo || 'https://placehold.co/50x50/red/white?text=Foto'}" class="w-12 h-12 rounded-full object-cover">
                            <div>
                                <h3 class="font-bold text-slate-800">${m.name}</h3>
                                <p class="text-xs text-red-500 font-medium">${m.origin}</p>
                            </div>
                        </div>
                        <div class="mt-3 text-xs space-y-1">
                            <p class="text-slate-500">Saldo: <span class="font-semibold text-red-600">Rp ${met.bal.toLocaleString()}</span></p>
                            <p class="text-green-600 font-semibold">Keuntungan: Rp ${Math.round(met.profit).toLocaleString()}</p>
                        </div>
                        <button onclick="openModal(${m.id})" class="mt-3 w-full bg-purple-100 text-purple-700 py-2 rounded-lg font-medium text-sm">Edit Data</button>
                    </div>
                `;
            }).join('');
            
            const totalIncomes = mustahiks.map(m => calculateMetrics(m).inc);
            const avg = totalIncomes.reduce((a,b)=>a+b, 0) / mustahikList.length;
            const maxVal = Math.max(...totalIncomes);
            const minVal = Math.min(...totalIncomes);
            const maxIdx = totalIncomes.indexOf(maxVal);
            const minIdx = totalIncomes.indexOf(minVal);

            document.getElementById('avg-income').innerText = `Rp ${Math.round(avg).toLocaleString()}`;
            document.getElementById('max-income').innerHTML = `<span class="block text-xs text-red-400">${mustahiks[maxIdx].name}</span>Rp ${maxVal.toLocaleString()}`;
            document.getElementById('min-income').innerHTML = `<span class="block text-xs text-red-400">${mustahiks[minIdx].name}</span>Rp ${minVal.toLocaleString()}`;
        }

        function openModal(id) {
            activeId = id;
            const m = mustahiks.find(x => x.id === id);
            const met = calculateMetrics(m);
            document.getElementById('edit-name').value = m.name;
            document.getElementById('edit-photo-url').value = m.photo || '';
            document.getElementById('edit-photo-preview').src = m.photo || 'https://placehold.co/80x80/red/white?text=Foto';
            document.getElementById('modal-balance').innerText = `Rp ${met.bal.toLocaleString()}`;
            document.getElementById('modal-profit').innerText = `Rp ${Math.round(met.profit).toLocaleString()}`;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
            renderTransactions();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); saveData(); }
        function updateName() { mustahiks.find(x => x.id === activeId).name = document.getElementById('edit-name').value; }
        function updatePhoto() {
            const url = document.getElementById('edit-photo-url').value;
            mustahiks.find(x => x.id === activeId).photo = url;
            document.getElementById('edit-photo-preview').src = url || 'https://placehold.co/80x80/red/white?text=Foto';
        }

        function addTransaction() {
            const m = mustahiks.find(x => x.id === activeId);
            const now = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' });
            const amount = parseInt(document.getElementById('new-amount').value);
            const type = document.getElementById('new-type').value;
            
            m.transactions.push({ amount, type, date: now });
            renderTransactions();
            const met = calculateMetrics(m);
            document.getElementById('modal-balance').innerText = `Rp ${met.bal.toLocaleString()}`;
            document.getElementById('modal-profit').innerText = `Rp ${Math.round(met.profit).toLocaleString()}`;
            document.getElementById('new-amount').value = '';

            const waLink = `https://wa.me/6282197057736?text=Laporan%20Zmart%0A%0ANama:%20${m.name}%0ATransaksi:%20${type === 'income' ? 'Pemasukan' : 'Pengeluaran'}%0AJumlah:%20Rp%20${amount.toLocaleString()}%0ATanggal:%20${now}`;
            window.open(waLink, '_blank');
        }

        function renderTransactions() {
            const m = mustahiks.find(x => x.id === activeId);
            document.getElementById('transaction-list').innerHTML = m.transactions.map(t => `
                <div class="flex justify-between text-xs p-1 border-b">
                    <span class="text-slate-400">${t.date}</span>
                    <span>${t.type}</span>
                    <span class="font-bold">Rp ${t.amount.toLocaleString()}</span>
                </div>
            `).join('');
        }

        function exportAllToExcel() {
            let csv = "Nama,Saldo,Keuntungan 10%\n" + mustahiks.map(m => {
                const met = calculateMetrics(m);
                return `${m.name},${met.bal},${Math.round(met.profit)}`;
            }).join("\n");
            const a = document.createElement('a'); a.href = 'data:text/csv,' + encodeURI(csv); a.download = 'Data_Mustahik.csv'; a.click();
        }

        function exportIndividualToExcel() {
            const m = mustahiks.find(x => x.id === activeId);
            let csv = "Tanggal,Tipe,Jumlah\n" + m.transactions.map(t => `${t.date},${t.type},${t.amount}`).join("\n");
            const a = document.createElement('a'); a.href = 'data:text/csv,' + encodeURI(csv); a.download = `${m.name}_Laporan.csv`; a.click();
        }

        window.onload = () => { updateUI(); updateDateDisplay(); };
    </script>
</body>
</html>
